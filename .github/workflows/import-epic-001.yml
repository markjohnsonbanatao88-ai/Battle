name: Import EPIC-001 snapshot

on:
  push:
    branches:
      - epic-001/test-infrastructure
    paths:
      - '.github/import/**'
      - '.github/workflows/import-epic-001.yml'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct patch
        shell: bash
        run: |
          cat .github/import/chunk-*.txt > /tmp/epic.patch.gz.b64
          base64 -d /tmp/epic.patch.gz.b64 > /tmp/epic.patch.gz
          echo "a22f806f6ea208ebbd5381d419e763e93b750172081535ecac46880c5e4deca9  /tmp/epic.patch.gz" | sha256sum -c -
          gunzip -c /tmp/epic.patch.gz > /tmp/epic.patch
          echo "4982f1a471163017d85fea7baf14d90abacb29ea640e75bc87348bdd041fe90e  /tmp/epic.patch" | sha256sum -c -

      - name: Apply snapshot
        shell: bash
        run: |
          git config user.name "OpenAI Codex"
          git config user.email "noreply@openai.com"
          git checkout -B imported aa1b53ebc3471562a47c8a64d0bf805deb061ab0
          git apply --index /tmp/epic.patch
          git commit -m "test: establish EPIC-001 quality and RLS gates"
          git push --force origin imported:epic-001/test-infrastructure
