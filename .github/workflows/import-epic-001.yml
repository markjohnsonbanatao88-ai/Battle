name: Import EPIC-001 snapshot

on:
  push:
    branches:
      - epic-001/test-infrastructure
    paths:
      - '.github/import/**'
      - '.github/workflows/import-epic-001.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/import/**'
      - '.github/workflows/import-epic-001.yml'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct patch
        shell: bash
        run: |
          cat .github/import/chunk-*.txt | tr -d '\r\n\t ' > /tmp/epic.patch.gz.b64
          base64 --decode /tmp/epic.patch.gz.b64 > /tmp/epic.patch.gz
          echo "Encoded bytes: $(wc -c < /tmp/epic.patch.gz.b64)"
          echo "Gzip bytes: $(wc -c < /tmp/epic.patch.gz)"
          sha256sum /tmp/epic.patch.gz
          gzip -t /tmp/epic.patch.gz
          gunzip -c /tmp/epic.patch.gz > /tmp/epic.patch
          echo "Patch bytes: $(wc -c < /tmp/epic.patch)"
          sha256sum /tmp/epic.patch

      - name: Apply snapshot
        shell: bash
        run: |
          git config user.name "OpenAI Codex"
          git config user.email "noreply@openai.com"
          git checkout -B imported aa1b53ebc3471562a47c8a64d0bf805deb061ab0
          git apply --index /tmp/epic.patch
          git commit -m "test: establish EPIC-001 quality and RLS gates"
          git push --force origin imported:epic-001/test-infrastructure
