name: Import EPIC-001 snapshot

on:
  push:
    branches:
      - epic-001/test-infrastructure
    paths:
      - '.github/import/**'
      - '.github/workflows/import-epic-001.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/import/**'
      - '.github/workflows/import-epic-001.yml'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Reconstruct patch
        id: reconstruct
        continue-on-error: true
        shell: bash
        run: |
          set +e
          {
            cat .github/import/chunk-*.txt | tr -d '\r\n\t ' > /tmp/epic.patch.gz.b64
            echo "cat_status=$?"
            echo "encoded_bytes=$(wc -c < /tmp/epic.patch.gz.b64)"
            base64 --decode /tmp/epic.patch.gz.b64 > /tmp/epic.patch.gz
            decode_status=$?
            echo "decode_status=$decode_status"
            echo "gzip_bytes=$(wc -c < /tmp/epic.patch.gz)"
            sha256sum /tmp/epic.patch.gz
            gzip -t /tmp/epic.patch.gz
            gzip_status=$?
            echo "gzip_status=$gzip_status"
            if [ "$gzip_status" -eq 0 ]; then
              gunzip -c /tmp/epic.patch.gz > /tmp/epic.patch
              gunzip_status=$?
              echo "gunzip_status=$gunzip_status"
              echo "patch_bytes=$(wc -c < /tmp/epic.patch)"
              sha256sum /tmp/epic.patch
            fi
          } 2>&1 | tee /tmp/import-diagnostic.txt
          test "$decode_status" -eq 0 -a "$gzip_status" -eq 0

      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epic-import-diagnostic
          path: /tmp/import-diagnostic.txt

      - name: Stop on reconstruction failure
        if: steps.reconstruct.outcome == 'failure'
        run: exit 1

      - name: Apply snapshot
        if: steps.reconstruct.outcome == 'success'
        shell: bash
        run: |
          git config user.name "OpenAI Codex"
          git config user.email "noreply@openai.com"
          git checkout -B imported aa1b53ebc3471562a47c8a64d0bf805deb061ab0
          git apply --index /tmp/epic.patch
          git commit -m "test: establish EPIC-001 quality and RLS gates"
          git push --force origin imported:epic-001/test-infrastructure
