name: Import EPIC-002 implementation

on:
  push:
    branches:
      - epic-002/auth-mfa-membership-hardening
    paths:
      - .github/workflows/import-epic002.yml

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: epic-002/auth-mfa-membership-hardening
          fetch-depth: 0

      - name: Decode and verify implementation bundle
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/import/epic002-files.tar.gz.b64 > /tmp/epic002-files.tar.gz
          echo "3bffe6c7a0b33f8da081f92ed8c7603ba89208e2620f9692031ffb2fd322d674  /tmp/epic002-files.tar.gz" | sha256sum --check

      - name: Apply EPIC-002 source tree
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/epic002-files.tar.gz
          rm -f .github/import/epic002-files.tar.gz.b64
          git add -A
          git diff --cached --check

      - name: Commit and push implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No implementation changes to commit."
            exit 0
          fi
          git commit -m "feat(epic-002): harden auth MFA and staff lifecycle"
          git push origin HEAD:epic-002/auth-mfa-membership-hardening
