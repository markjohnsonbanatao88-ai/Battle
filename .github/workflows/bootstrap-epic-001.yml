name: Bootstrap EPIC-001 snapshot

on:
  push:
    branches:
      - epic-001/test-infrastructure
    paths:
      - '.github/import/snapshot-*.txt'
      - '.github/workflows/bootstrap-epic-001.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/import/snapshot-*.txt'
      - '.github/workflows/bootstrap-epic-001.yml'

permissions:
  contents: write

jobs:
  import-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: epic-001/test-infrastructure
          fetch-depth: 0

      - name: Decode snapshot
        shell: bash
        run: |
          set -euo pipefail
          cat .github/import/snapshot-*.txt \
            | tr -d '\r\n\t ' \
            | base64 --decode > /tmp/batalla-snapshot.xz
          test -s /tmp/batalla-snapshot.xz
          xz -t /tmp/batalla-snapshot.xz
          xz -dc /tmp/batalla-snapshot.xz > /tmp/batalla-snapshot.raw
          test -s /tmp/batalla-snapshot.raw

      - name: Extract snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/batalla-tree
          if tar -tf /tmp/batalla-snapshot.raw >/dev/null 2>&1; then
            tar -xf /tmp/batalla-snapshot.raw -C /tmp/batalla-tree
          elif grep -q '^diff --git ' /tmp/batalla-snapshot.raw; then
            git checkout -B snapshot-base aa1b53ebc3471562a47c8a64d0bf805deb061ab0
            git apply --index --3way /tmp/batalla-snapshot.raw
            mkdir -p /tmp/batalla-tree
            git checkout-index -a -f --prefix=/tmp/batalla-tree/
            git checkout epic-001/test-infrastructure
          else
            echo 'Unsupported decoded snapshot format'
            file /tmp/batalla-snapshot.raw || true
            head -c 80 /tmp/batalla-snapshot.raw | od -An -tx1 || true
            exit 1
          fi

      - name: Validate snapshot
        shell: bash
        run: |
          set -euo pipefail
          source_dir=/tmp/batalla-tree
          if [[ ! -f "$source_dir/package.json" ]]; then
            candidate="$(find "$source_dir" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
            if [[ -n "$candidate" && -f "$candidate/package.json" ]]; then
              source_dir="$candidate"
            fi
          fi
          echo "$source_dir" > /tmp/source-dir
          test -f "$source_dir/package.json"
          test -f "$source_dir/package-lock.json"
          test -d "$source_dir/src"
          test -d "$source_dir/docs"
          test -d "$source_dir/supabase"

      - name: Publish complete repository
        shell: bash
        run: |
          set -euo pipefail
          source_dir="$(cat /tmp/source-dir)"
          git checkout epic-001/test-infrastructure
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$source_dir"/. .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Snapshot already matches."
            exit 0
          fi
          git commit -m "test: establish EPIC-001 quality and RLS gates"
          git push origin HEAD:epic-001/test-infrastructure
