name: Bootstrap EPIC-001 snapshot

on:
  push:
    branches:
      - epic-001/test-infrastructure
    paths:
      - '.github/import/snapshot-*.txt'
      - '.github/workflows/bootstrap-epic-001.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/import/snapshot-*.txt'
      - '.github/workflows/bootstrap-epic-001.yml'

permissions:
  contents: write

jobs:
  import-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: epic-001/test-infrastructure
          fetch-depth: 0

      - name: Reconstruct exact repository snapshot
        shell: bash
        run: |
          set -euo pipefail

          cat .github/import/snapshot-*.txt \
            | tr -d '\r\n\t ' \
            | base64 --decode > /tmp/batalla-tree.tar.xz

          xz -t /tmp/batalla-tree.tar.xz
          mkdir -p /tmp/batalla-tree
          tar -xJf /tmp/batalla-tree.tar.xz -C /tmp/batalla-tree

          source_dir=/tmp/batalla-tree
          if [[ ! -f "$source_dir/package.json" ]]; then
            candidate="$(find "$source_dir" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
            if [[ -n "$candidate" && -f "$candidate/package.json" ]]; then
              source_dir="$candidate"
            fi
          fi

          test -f "$source_dir/package.json"
          test -f "$source_dir/package-lock.json"
          test -d "$source_dir/src"
          test -d "$source_dir/docs"
          test -d "$source_dir/supabase"

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$source_dir"/. .

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "Snapshot already matches."
            exit 0
          fi

          git commit -m "test: establish EPIC-001 quality and RLS gates"
          git push origin HEAD:epic-001/test-infrastructure
